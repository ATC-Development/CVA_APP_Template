<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATC — Core Value Assessment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      background: #1b3a5c;
      padding: 0 20px;
      height: 46px;
      align-items: flex-end;
    }
    .tab-btn {
      padding: 10px 24px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: color .12s;
    }
    .tab-btn.on {
      color: #ffffff;
      border-bottom-color: #60a5fa;
    }
    .tab-btn:hover:not(.on) {
      color: rgba(255,255,255,0.85);
    }

    /* Frames */
    .frame-wrap { width: 100%; height: calc(100vh - 46px); }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Tab navigation -->
  <div class="tab-bar">
    <button class="tab-btn on" id="btn-emp" onclick="showTab('emp')">Employee</button>
    <button class="tab-btn"    id="btn-mgr" onclick="showTab('mgr')">Manager</button>
    <button class="tab-btn"    id="btn-hr"  onclick="showTab('hr')">HR</button>
  </div>

  <!-- Tab frames -->
  <div class="frame-wrap">
    <iframe id="frame-emp" srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
  &lt;meta charset=&quot;UTF-8&quot;&gt;
  &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
  &lt;title&gt;CVA — Employee Tab&lt;/title&gt;
  &lt;link rel=&quot;stylesheet&quot; href=&quot;https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css&quot;&gt;
  &lt;style&gt;
    :root {
      --page:  #dde3ec;
      --w:     #ffffff;
      --w1:    #f4f6f9;
      --wb:    rgba(15,23,42,.09);
      --wbs:   rgba(15,23,42,.16);
      --wbst:  rgba(15,23,42,.28);

      --hemp:  #1b3a5c;   /* Employee tab header — deep navy */
      --hrev:  #2c3e1a;   /* Reviewing Now header — dark olive */
      --hhist: #2d1b3d;   /* History header — dark plum */
      --htxt:  #e2e8f0;
      --hmut:  #8da4be;

      --t1:  #0f172a;
      --t2:  #475569;
      --tm:  #94a3b8;

      --ac:  #2563eb;  --ag:  #eff6ff;  --ab:  #93c5fd;
      --sc:  #059669;  --sg:  #ecfdf5;  --sb:  #6ee7b7;
      --wc:  #d97706;  --wg:  #fffbeb;  --wb2: #fcd34d;
      --dc:  #dc2626;  --dg:  #fef2f2;  --db:  #fca5a5;
      --nc:  #64748b;  --ng:  #f8fafc;  --nb:  #e2e8f0;
      --hsc: #0e7490;  --hsg: #ecfeff;  --hsb: #a5f3fc;

      --r: 10px; --rs: 6px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --page:#1c1c1a; --w:#2e2e2b; --w1:#252523;
        --wb:rgba(255,255,255,0.08); --wbs:rgba(255,255,255,0.14); --wbst:rgba(255,255,255,0.28);
        --t1:#e8e6de; --t2:#9c9a92; --tm:#6b6a63;
        --ac:#85b7eb; --ag:#042c53; --ab:#0c447c;
        --sc:#97c459; --sg:#0f200a; --sb:#173404;
        --wc:#fac775; --wg:#412402; --wb2:#633806;
        --dc:#f09595; --dg:#2a0b0b; --db:#501313;
        --nc:#9c9a92; --ng:#252523; --nb:#2e2e2b;
        --hsg:#002b30; --hsb:#0e4a52;
      }
    }
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; padding:24px 20px; background:var(--page); color:var(--t1);
      font-family:system-ui,-apple-system,&#x27;Segoe UI&#x27;,Helvetica,Arial,sans-serif;
      font-size:14px; line-height:1.5; }
    .page { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }

    /* widget */
    .widget { background:var(--w); border:0.5px solid var(--wbs); border-radius:var(--r);
      overflow:hidden; box-shadow:0 1px 4px rgba(15,23,42,.07); }
    .whead  { padding:11px 16px; display:flex; align-items:center; justify-content:space-between; }
    .wlabel { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--htxt); }
    .sbadge { font-size:10px; font-weight:500; text-transform:none; letter-spacing:0;
      padding:2px 8px; border-radius:3px; background:rgba(255,255,255,.15); color:var(--htxt); }

    /* tags */
    .tag { display:inline-flex; align-items:center; padding:3px 9px; border-radius:4px;
      font-size:11px; font-weight:600; flex-shrink:0; }
    .tg-danger  { background:var(--dg); color:var(--dc); }
    .tg-warn    { background:var(--wg); color:var(--wc); }
    .tg-success { background:var(--sg); color:var(--sc); }
    .tg-accent  { background:var(--ag); color:var(--ac); }
    .tg-neutral { background:var(--ng); color:var(--nc); border:0.5px solid var(--nb); }
    .tg-pro     { background:#f5f3ff;   color:#6d28d9;   }

    /* pipeline bar */
    .pipe { display:flex; gap:3px; margin-top:5px; width:120px; }
    .pip  { height:4px; flex:1; border-radius:2px; background:var(--wbst); }
    .pip.d { background:var(--sc); }
    .pip.c { background:var(--wc); }

    /* icon button */
    .ibtn { padding:5px 10px; border-radius:var(--rs); border:0.5px solid var(--wbs);
      background:var(--w1); color:var(--t2); cursor:pointer; font-size:12px;
      display:inline-flex; align-items:center; gap:4px; }
    .ibtn:hover { background:var(--nb); }

    /* Archive CVA / PPM buttons */
    .arch-cva { padding:3px 10px; border-radius:var(--rs); border:0.5px solid var(--ab);
      background:var(--ag); color:var(--ac); font-size:11px; font-weight:600; cursor:pointer; }
    .arch-cva:hover { background:var(--ab); }
    .arch-ppm { padding:3px 10px; border-radius:var(--rs); border:0.5px solid #ddd6fe;
      background:#f5f3ff; color:#6d28d9; font-size:11px; font-weight:600; cursor:pointer; }
    .arch-ppm:hover { background:#ddd6fe; }

    /* stat card pair */
    .stat-pair { display:grid; grid-template-columns:1fr 1fr; border-bottom:0.5px solid var(--wb); }
    .stat-card { padding:14px 18px; border-right:0.5px solid var(--wb); }
    .stat-card:last-child { border-right:none; }
    .stat-label { font-size:10px; color:var(--tm); text-transform:uppercase;
      letter-spacing:.05em; font-weight:600; margin-bottom:5px; }
    .stat-val   { font-size:20px; font-weight:600; color:var(--t1); }
    .stat-sub   { font-size:11px; color:var(--t2); margin-top:4px; }

    /* in-progress CVA card */
    .inprog-card { padding:16px 18px; }
    .inprog-row  { display:flex; align-items:center; justify-content:space-between;
      margin-bottom:6px; }
    .rev-row     { font-size:12px; color:var(--t2); margin-bottom:8px; }
    .you-badge   { background:var(--ag); color:var(--ac); border:0.5px solid var(--ab);
      padding:1px 6px; border-radius:3px; font-size:10px; font-weight:700; }

    /* ppm form status */
    .ppm-body  { padding:14px 18px; }
    .ppm-grid  { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ppm-form  { border:0.5px solid var(--wb); border-radius:var(--rs); padding:10px 12px;
      background:var(--w1); }
    .ppm-form-label { font-size:10px; color:var(--tm); text-transform:uppercase;
      letter-spacing:.05em; font-weight:600; margin-bottom:6px; }
    .dot-ok   { width:8px; height:8px; border-radius:50%; background:var(--sc);
      display:inline-block; margin-right:4px; }
    .dot-pend { width:8px; height:8px; border-radius:50%; background:var(--wbst);
      display:inline-block; margin-right:4px; }

    /* reviewing now rows */
    .rev-list-row { display:flex; align-items:center; gap:10px; padding:10px 16px;
      border-bottom:0.5px solid var(--wb); }
    .rev-list-row:last-child { border-bottom:none; }
    .av  { width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
    .av-blue  { background:var(--ag); color:var(--ac); }
    .av-green { background:var(--sg); color:var(--sc); }
    .av-amber { background:var(--wg); color:var(--wc); }
    .rev-name { flex:1; min-width:0; }
    .rn       { font-size:13px; font-weight:600; color:var(--t1); }
    .rs2      { font-size:11px; color:var(--t2); margin-top:2px; }
    .rev-role { font-size:11px; color:var(--tm); white-space:nowrap; flex-shrink:0;
      width:90px; text-align:right; }

    /* history table */
    .hist-cols { display:flex; align-items:center; gap:8px; padding:7px 16px;
      border-bottom:0.5px solid var(--wb); background:var(--w1); }
    .hcol-type { width:60px; font-size:10px; font-weight:600; letter-spacing:.05em;
      text-transform:uppercase; color:var(--tm); flex-shrink:0; }
    .hcol-date { width:110px; font-size:10px; font-weight:600; letter-spacing:.05em;
      text-transform:uppercase; color:var(--tm); flex-shrink:0; }
    .hcol-det  { flex:1; font-size:10px; font-weight:600; letter-spacing:.05em;
      text-transform:uppercase; color:var(--tm); }
    .hcol-act  { width:120px; font-size:10px; font-weight:600; letter-spacing:.05em;
      text-transform:uppercase; color:var(--tm); flex-shrink:0; text-align:center; }

    .hist-row  { display:flex; align-items:center; gap:8px; padding:9px 16px;
      border-bottom:0.5px solid var(--wb); }
    .hist-row:last-of-type { border-bottom:none; }
    .hcell-type { width:60px; flex-shrink:0; }
    .hcell-date { width:110px; font-size:12px; font-weight:500; color:var(--t1); flex-shrink:0; }
    .hcell-det  { flex:1; font-size:11px; color:var(--t2); }
    .hcell-act  { width:120px; flex-shrink:0; display:flex; gap:5px; justify-content:center; }

    /* inline archive expand */
    .arch-rows { background:var(--hsg); border-top:0.5px solid var(--hsb);
      border-bottom:0.5px solid var(--hsb); }
    .arch-detail-row { display:flex; align-items:center; gap:10px; padding:7px 16px; }
    .arch-detail-row + .arch-detail-row { border-top:0.5px solid rgba(0,0,0,.05); }
    .type-badge { font-size:9px; font-weight:800; letter-spacing:.06em;
      padding:2px 6px; border-radius:3px; flex-shrink:0; }
    .type-cva { background:var(--ag); color:var(--ac); }
    .type-ppm { background:#f5f3ff;   color:#6d28d9;   }
    .adate  { font-size:11px; font-weight:500; color:var(--t1); white-space:nowrap;
      flex-shrink:0; width:100px; }
    .adetail{ font-size:10px; color:var(--t2); flex:1; }
    .vbtn   { font-size:11px; padding:2px 9px; border-radius:3px; border:0.5px solid var(--ab);
      background:var(--ag); color:var(--ac); cursor:pointer; flex-shrink:0; font-weight:500; }
    .vbtn:hover { background:var(--ab); }

    /* view modal */
    #view-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:300;
      display:none; align-items:center; justify-content:center; padding:20px; }
    #view-overlay.open { display:flex; }
    #view-card { background:var(--w); border-radius:var(--r); width:100%; max-width:520px;
      max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(15,23,42,.25); }
    .mc-head { padding:14px 18px; background:var(--hemp); display:flex;
      align-items:center; justify-content:space-between; }
    .mc-close { background:transparent; border:none; cursor:pointer;
      font-size:18px; color:var(--hmut); padding:0; }
    .mc-close:hover { color:var(--htxt); }
    .mc-body { padding:16px 18px; }
    .mc-row  { display:flex; align-items:center; justify-content:space-between;
      padding:7px 0; border-bottom:0.5px solid var(--wb); }
    .mc-row:last-child { border-bottom:none; }
    .mc-cat  { font-size:12px; color:var(--t2); }
    .mc-rat  { font-size:14px; font-weight:700; }
    .rat-pos { color:var(--sc); }
    .rat-mid { color:var(--wc); }
    .rat-neg { color:var(--dc); }
    .mc-sect { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
      color:var(--tm); margin:12px 0 4px; }

    .plabel { font-size:11px; color:var(--t2); margin:0 0 4px; font-weight:500; }
    .top-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div class=&quot;page&quot;&gt;

  &lt;p class=&quot;plabel&quot;&gt;Employee Tab — Design Concept&lt;/p&gt;

  &lt;!-- ══ GLOBAL ACTION BANNER ══ --&gt;
  &lt;div style=&quot;background:var(--wg); border:0.5px solid var(--wb2); border-radius:var(--r);
    padding:10px 16px; display:flex; justify-content:space-between; align-items:center;
    box-shadow:0 1px 4px rgba(15,23,42,.07);&quot;&gt;
    &lt;div style=&quot;display:flex; align-items:center; gap:9px;&quot;&gt;
      &lt;i class=&quot;ti ti-alert-circle&quot; style=&quot;font-size:16px; color:var(--wc); flex-shrink:0;&quot;&gt;&lt;/i&gt;
      &lt;span style=&quot;font-size:13px; color:var(--wc); font-weight:500;&quot;&gt;
        Jamie Nabritt — your signature is required to advance
      &lt;/span&gt;
    &lt;/div&gt;
    &lt;button style=&quot;padding:4px 14px; border-radius:var(--rs); border:0.5px solid var(--wb2);
      background:transparent; color:var(--wc); font-size:12px; font-weight:500; cursor:pointer;&quot;&gt;
      Open
    &lt;/button&gt;
  &lt;/div&gt;


  &lt;!-- ══ TOP ROW: CVA + PPM ══ --&gt;
  &lt;div class=&quot;top-row&quot;&gt;

    &lt;!-- YOUR CVA --&gt;
    &lt;div class=&quot;widget&quot;&gt;
      &lt;div class=&quot;whead&quot; style=&quot;background:var(--hemp);&quot;&gt;
        &lt;span class=&quot;wlabel&quot;&gt;Your CVA&lt;/span&gt;
        &lt;span class=&quot;sbadge&quot;&gt;Everyone&lt;/span&gt;
      &lt;/div&gt;

      &lt;!-- In-progress state --&gt;
      &lt;div class=&quot;inprog-card&quot;&gt;
        &lt;div class=&quot;inprog-row&quot;&gt;
          &lt;div&gt;
            &lt;div style=&quot;font-size:10px; color:var(--tm); text-transform:uppercase;
              letter-spacing:.05em; font-weight:600; margin-bottom:4px;&quot;&gt;Current cycle&lt;/div&gt;
            &lt;div style=&quot;font-size:18px; font-weight:600; color:var(--t1);&quot;&gt;Aug 12, 2026&lt;/div&gt;
          &lt;/div&gt;
          &lt;span class=&quot;tag tg-warn&quot;&gt;With reviewers&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rev-row&quot;&gt;
          1st: C. Sosebee &amp;nbsp;·&amp;nbsp; 2nd: &lt;span class=&quot;you-badge&quot;&gt;You&lt;/span&gt; &amp;nbsp;·&amp;nbsp;
          HR: Meg Johnson &amp;nbsp;·&amp;nbsp; Exec: CEO
        &lt;/div&gt;
        &lt;div class=&quot;pipe&quot;&gt;
          &lt;div class=&quot;pip d&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;pip c&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;pip&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;pip&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;pip&quot;&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div style=&quot;font-size:10px; color:var(--tm); margin-top:4px;&quot;&gt;
          Started → With reviewers → HR review → With employee → Executive sign-off
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Last completed --&gt;
      &lt;div style=&quot;border-top:0.5px solid var(--wb);&quot;&gt;
        &lt;div class=&quot;stat-pair&quot;&gt;
          &lt;div class=&quot;stat-card&quot;&gt;
            &lt;div class=&quot;stat-label&quot;&gt;Last completed&lt;/div&gt;
            &lt;div class=&quot;stat-val&quot; style=&quot;font-size:16px;&quot;&gt;Aug 14, 2025&lt;/div&gt;
            &lt;div class=&quot;stat-sub&quot;&gt;Primary: C. Sosebee&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;stat-card&quot;&gt;
            &lt;div class=&quot;stat-label&quot;&gt;Next due&lt;/div&gt;
            &lt;div class=&quot;stat-val&quot; style=&quot;font-size:16px;&quot;&gt;Aug 12, 2026&lt;/div&gt;
            &lt;div class=&quot;stat-sub&quot;&gt;Anniversary-based&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;


    &lt;!-- YOUR PPM --&gt;
    &lt;div class=&quot;widget&quot;&gt;
      &lt;div class=&quot;whead&quot; style=&quot;background:#1a3d2b;&quot;&gt;
        &lt;span class=&quot;wlabel&quot;&gt;Your PPM&lt;/span&gt;
        &lt;span class=&quot;sbadge&quot;&gt;Everyone&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ppm-body&quot;&gt;
        &lt;div style=&quot;font-size:12px; color:var(--t2); margin-bottom:12px;&quot;&gt;
          Mid-cycle · both forms completed independently, then compared together
        &lt;/div&gt;
        &lt;div class=&quot;ppm-grid&quot;&gt;
          &lt;div class=&quot;ppm-form&quot;&gt;
            &lt;div class=&quot;ppm-form-label&quot;&gt;Your form&lt;/div&gt;
            &lt;div style=&quot;font-size:15px; font-weight:600; color:var(--t1); margin-bottom:6px;&quot;&gt;
              Mar 15, 2026
            &lt;/div&gt;
            &lt;span class=&quot;tag tg-danger&quot;&gt;Not yet started&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;ppm-form&quot;&gt;
            &lt;div class=&quot;ppm-form-label&quot;&gt;Supervisor&#x27;s form&lt;/div&gt;
            &lt;div style=&quot;font-size:15px; font-weight:600; color:var(--t1); margin-bottom:6px;&quot;&gt;
              Mar 15, 2026
            &lt;/div&gt;
            &lt;span class=&quot;tag tg-danger&quot;&gt;Not yet started&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div style=&quot;margin-top:12px; padding-top:10px; border-top:0.5px solid var(--wb);&quot;&gt;
          &lt;div class=&quot;stat-pair&quot; style=&quot;border:none; padding:0; margin:0;&quot;&gt;
            &lt;div style=&quot;padding:0 6px 0 0;&quot;&gt;
              &lt;div class=&quot;stat-label&quot;&gt;Last completed&lt;/div&gt;
              &lt;div style=&quot;font-size:14px; font-weight:500; color:var(--t1); margin-top:3px;&quot;&gt;—&lt;/div&gt;
              &lt;div class=&quot;stat-sub&quot;&gt;No PPM on record&lt;/div&gt;
            &lt;/div&gt;
            &lt;div style=&quot;padding:0 0 0 6px; border-left:0.5px solid var(--wb);&quot;&gt;
              &lt;div class=&quot;stat-label&quot;&gt;Supervisor&lt;/div&gt;
              &lt;div style=&quot;font-size:14px; font-weight:500; color:var(--t1); margin-top:3px;&quot;&gt;
                C. Sosebee
              &lt;/div&gt;
              &lt;div class=&quot;stat-sub&quot;&gt;Primary supervisor&lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;&lt;!-- /top-row --&gt;


  &lt;!-- ══ REVIEWING NOW (conditional — only renders when named as reviewer) ══ --&gt;
  &lt;div class=&quot;widget&quot;&gt;
    &lt;div class=&quot;whead&quot; style=&quot;background:var(--hrev);&quot;&gt;
      &lt;span class=&quot;wlabel&quot;&gt;Reviewing Now&lt;/span&gt;
      &lt;span class=&quot;sbadge&quot;&gt;Named reviewer only&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;rev-list-row&quot;&gt;
      &lt;div class=&quot;av av-amber&quot;&gt;JN&lt;/div&gt;
      &lt;div class=&quot;rev-name&quot;&gt;
        &lt;div class=&quot;rn&quot;&gt;Jamie Nabritt&lt;/div&gt;
        &lt;div class=&quot;rs2&quot;&gt;Due Feb 8, 2026 · Secondary reviewer&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;flex:1;&quot;&gt;&lt;/div&gt;
      &lt;span class=&quot;tag tg-warn&quot; style=&quot;margin-right:10px;&quot;&gt;With reviewers&lt;/span&gt;
      &lt;span class=&quot;tag tg-danger&quot;&gt;Needs your signature&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;rev-list-row&quot;&gt;
      &lt;div class=&quot;av av-green&quot;&gt;CM&lt;/div&gt;
      &lt;div class=&quot;rev-name&quot;&gt;
        &lt;div class=&quot;rn&quot;&gt;Courtney Murrah&lt;/div&gt;
        &lt;div class=&quot;rs2&quot;&gt;Completed Aug 4, 2025 · Primary reviewer&lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;flex:1;&quot;&gt;&lt;/div&gt;
      &lt;span class=&quot;tag tg-success&quot;&gt;Complete&lt;/span&gt;
    &lt;/div&gt;

  /* ── Archive expand with type filter ── */
  function toggleHistType(id, type) {
    const el = document.getElementById(&#x27;hist-&#x27;+id);
    if (!el) return;
    if (el.style.display !== &#x27;none&#x27; &amp;&amp; el.dataset.activeType === type) {
      el.style.display = &#x27;none&#x27;;
      el.dataset.activeType = &#x27;&#x27;;
      return;
    }
    el.querySelectorAll(&#x27;.arch-detail-row&#x27;).forEach(row =&gt; {
      const badge = row.querySelector(&#x27;.type-badge&#x27;);
      if (!badge) { row.style.display = &#x27;&#x27;; return; }
      row.style.display = badge.classList.contains(&#x27;type-&#x27;+type) ? &#x27;&#x27; : &#x27;none&#x27;;
    });
    el.style.display = &#x27;&#x27;;
    el.dataset.activeType = type;
  }

  /* ── View record modal ── */
  function openViewModal(name, type, date) {
    document.getElementById(&#x27;mc-name&#x27;).textContent = name;
    document.getElementById(&#x27;mc-date&#x27;).textContent = date;
    const badge = document.getElementById(&#x27;mc-badge&#x27;);
    badge.textContent = type;
    badge.className  = &#x27;type-badge &#x27; + (type === &#x27;CVA&#x27; ? &#x27;type-cva&#x27; : &#x27;type-ppm&#x27;);
    document.getElementById(&#x27;view-overlay&#x27;).classList.add(&#x27;open&#x27;);
  }
  function closeViewModal() {
    document.getElementById(&#x27;view-overlay&#x27;).classList.remove(&#x27;open&#x27;);
  }

&lt;script&gt;
  /* ── widget tabs ── */
  function wTab(w, t) {
    [&#x27;ip&#x27;,&#x27;up&#x27;,&#x27;co&#x27;].forEach(tab =&gt; {
      const pane = document.getElementById(w+&#x27;-&#x27;+tab);
      const btn  = document.querySelector(`[data-w=&quot;${w}&quot;][data-t=&quot;${tab}&quot;]`);
      if (pane) pane.classList.toggle(&#x27;on&#x27;, tab === t);
      if (btn)  btn.classList.toggle(&#x27;on&#x27;,  tab === t);
    });
  }

  /* ── hierarchy node expand/collapse ── */
  function toggleNode(id) {
    const ch  = document.getElementById(&#x27;children-&#x27;+id);
    const btn = document.getElementById(&#x27;xbtn-&#x27;+id);
    if (!ch) return;
    const open = ch.style.display !== &#x27;none&#x27;;
    ch.style.display = open ? &#x27;none&#x27; : &#x27;&#x27;;
    if (btn) btn.textContent = open ? &#x27;▶&#x27; : &#x27;▼&#x27;;
  }

  /* ── notes expand/collapse ── */
  function toggleNotes(id) {
    const el  = document.getElementById(&#x27;notes-&#x27;+id);
    const btn = document.getElementById(&#x27;nbtn-&#x27;+id);
    if (!el) return;
    const open = el.style.display !== &#x27;none&#x27;;
    el.style.display = open ? &#x27;none&#x27; : &#x27;&#x27;;
    if (btn) {
      const n = btn.textContent.match(/\d+/)[0];
      btn.textContent = open ? n+&#x27; ▶&#x27; : n+&#x27; ▼&#x27;;
    }
  }

  /* ── archive expand/collapse ── */
  function toggleHist(id) {
    const el  = document.getElementById(&#x27;hist-&#x27;+id);
    const btn = document.getElementById(&#x27;hbtn-&#x27;+id);
    if (!el) return;
    const open = el.style.display !== &#x27;none&#x27;;
    el.style.display = open ? &#x27;none&#x27; : &#x27;&#x27;;
    if (btn) {
      const n = btn.textContent.match(/\d+/)[0];
      btn.innerHTML = `&lt;i class=&quot;ti ti-files&quot; style=&quot;font-size:11px;vertical-align:-1px;&quot;&gt;&lt;/i&gt; ${n} ${open ? &#x27;▶&#x27; : &#x27;▼&#x27;}`;
    }
  }

  /* ── add-note form toggle ── */
  function toggleForm(id) {
    const el = document.getElementById(&#x27;form-&#x27;+id);
    if (el) el.style.display = el.style.display === &#x27;none&#x27; ? &#x27;&#x27; : &#x27;none&#x27;;
  }

  /* ── modal ── */
  const reviewers = {
    &#x27;jasmine&#x27;: [&#x27;VP of Operations&#x27;,&#x27;—&#x27;],
    &#x27;joe&#x27;:     [&#x27;Jasmine Torres&#x27;,&#x27;VP of Operations&#x27;],
    &#x27;lisa&#x27;:    [&#x27;Joe Martinez&#x27;,&#x27;Jasmine Torres&#x27;],
    &#x27;bobby&#x27;:   [&#x27;Joe Martinez&#x27;,&#x27;Jasmine Torres&#x27;],
    &#x27;frank&#x27;:   [&#x27;Joe Martinez&#x27;,&#x27;Jasmine Torres&#x27;],
    &#x27;maria&#x27;:   [&#x27;Jasmine Torres&#x27;,&#x27;VP of Operations&#x27;],
    &#x27;derek&#x27;:   [&#x27;VP of Operations&#x27;,&#x27;—&#x27;],
  };
  function openModal(name, type, date) {
    document.getElementById(&#x27;mc-name&#x27;).textContent    = name;
    document.getElementById(&#x27;mc-date&#x27;).textContent    = date;
    const badge = document.getElementById(&#x27;mc-type-badge&#x27;);
    badge.textContent = type;
    badge.className   = &#x27;type-badge &#x27; + (type === &#x27;CVA&#x27; ? &#x27;type-cva&#x27; : &#x27;type-ppm&#x27;);
    document.getElementById(&#x27;mc-primary&#x27;).textContent   = &#x27;C. Sosebee&#x27;;
    document.getElementById(&#x27;mc-secondary&#x27;).textContent = &#x27;J. Latiolais&#x27;;
    document.getElementById(&#x27;modal-overlay&#x27;).classList.add(&#x27;open&#x27;);
  }
  function closeModal() {
    document.getElementById(&#x27;modal-overlay&#x27;).classList.remove(&#x27;open&#x27;);
  }

  /* ── hierarchy search ── */
  let savedCollapse = null;

  function doSearch(q) {
    q = q.trim().toLowerCase();
    const allRows = document.querySelectorAll(&#x27;.hrow[data-id]&#x27;);
    const noRes   = document.getElementById(&#x27;hier-no-results&#x27;);

    if (!q) {
      // Restore collapsed state
      if (savedCollapse) {
        Object.entries(savedCollapse).forEach(([id, disp]) =&gt; {
          const el = document.getElementById(id);
          if (el) el.style.display = disp;
        });
        savedCollapse = null;
      }
      allRows.forEach(r =&gt; {
        r.style.display = &#x27;&#x27;;
        const nm = r.querySelector(&#x27;.hname&#x27;);
        if (nm) nm.classList.remove(&#x27;match-hl&#x27;);
      });
      noRes.style.display = &#x27;none&#x27;;
      return;
    }

    // Save original collapse state once
    if (!savedCollapse) {
      savedCollapse = {};
      document.querySelectorAll(&#x27;[id^=&quot;children-&quot;]&#x27;).forEach(el =&gt; {
        savedCollapse[el.id] = el.style.display || &#x27;&#x27;;
      });
    }

    // Force-open all children containers during search
    document.querySelectorAll(&#x27;[id^=&quot;children-&quot;]&#x27;).forEach(el =&gt; {
      el.style.display = &#x27;&#x27;;
    });

    // Find matches and build ancestor set
    const show = new Set();
    allRows.forEach(r =&gt; {
      const nm = r.dataset.name || &#x27;&#x27;;
      if (nm.toLowerCase().includes(q)) {
        show.add(r.dataset.id);
        const hnm = r.querySelector(&#x27;.hname&#x27;);
        if (hnm) hnm.classList.add(&#x27;match-hl&#x27;);
        // Walk ancestors
        let pid = r.dataset.parent;
        while (pid) {
          show.add(pid);
          const par = document.querySelector(`.hrow[data-id=&quot;${pid}&quot;]`);
          pid = par ? (par.dataset.parent || &#x27;&#x27;) : &#x27;&#x27;;
        }
      } else {
        const hnm = r.querySelector(&#x27;.hname&#x27;);
        if (hnm) hnm.classList.remove(&#x27;match-hl&#x27;);
      }
    });

    allRows.forEach(r =&gt; {
      r.style.display = show.has(r.dataset.id) ? &#x27;&#x27; : &#x27;none&#x27;;
    });

    noRes.style.display = show.size === 0 ? &#x27;&#x27; : &#x27;none&#x27;;
  }
&lt;/script&gt;

      position:absolute; top:100%; left:-1px; right:-1px; z-index:50;
      background:var(--w); border:0.5px solid var(--wbs);
      border-top:none; border-radius:0 0 var(--r) var(--r);
      box-shadow:0 6px 16px rgba(15,23,42,.13);
      max-height:300px; overflow-y:auto;
    }
    .pop-head {
      padding:8px 12px; background:var(--w1); border-bottom:0.5px solid var(--wb);
      display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; z-index:1;
    }
    .pop-title  { font-size:11px; font-weight:600; color:var(--t1); }
    .pop-close  { background:transparent; border:none; cursor:pointer;
      color:var(--tm); font-size:14px; padding:0; line-height:1; }
    .pop-close:hover { color:var(--t1); }
    .pop-row {
      display:flex; align-items:center; gap:8px; padding:7px 12px;
      border-bottom:0.5px solid var(--wb);
    }
    .pop-row:last-child { border-bottom:none; }
    .pop-av {
      width:24px; height:24px; border-radius:50%; background:var(--ag); color:var(--ac);
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; flex-shrink:0;
    }
    .pop-name { font-size:12px; font-weight:500; color:var(--t1); flex:1; min-width:0; }
    .pop-mgr  { font-size:10px; color:var(--tm); white-space:nowrap; flex-shrink:0; margin-right:4px; }
    .pop-more { padding:8px 12px; text-align:center; font-size:11px; color:var(--tm); font-style:italic; }

    /* sub-text labels */
    .sub-label { color:var(--tm); }
    .sub-sep   { color:var(--nb); margin:0 4px; }
    .sub-dsep  { color:var(--wbs); margin:0 8px; font-weight:700; letter-spacing:.05em; }

    /* inline archive rows */
    .hist-rows { background:var(--hsg); border-bottom:0.5px solid var(--hsb); }
    .hist-row  { display:flex; align-items:center; gap:10px; padding:7px 16px; }
    .hist-row + .hist-row { border-top:0.5px solid rgba(0,0,0,.05); }
    .type-badge { font-size:9px; font-weight:800; letter-spacing:.06em;
      padding:2px 6px; border-radius:3px; flex-shrink:0; }
    .type-cva { background:var(--ag); color:var(--ac); }
    .type-ppm { background:#f5f3ff;   color:#6d28d9;   }
    .hdate    { font-size:11px; font-weight:500; color:var(--t1); white-space:nowrap; flex-shrink:0; width:110px; }
    .hdetail  { font-size:10px; color:var(--t2); flex:1; }
    .vbtn     { font-size:11px; padding:2px 8px; border-radius:3px; border:0.5px solid var(--ab);
      background:var(--ag); color:var(--ac); cursor:pointer; flex-shrink:0; font-weight:500; }
    .vbtn:hover { background:var(--ab); }

    /* page label */
    .plabel { font-size:11px; color:var(--t2); margin:0 0 4px; font-weight:500; }
    .view-all { padding:9px 16px; text-align:right; font-size:12px; color:var(--ac);
      cursor:pointer; border-top:0.5px solid var(--wb); }
    .view-all:hover { text-decoration:underline; }
    /* Archive CVA / PPM buttons */
    .arch-cva { padding:3px 10px; border-radius:var(--rs); border:0.5px solid var(--ab);
      background:var(--ag); color:var(--ac); font-size:11px; font-weight:600; cursor:pointer; }
    .arch-cva:hover { background:var(--ab); }
    .arch-ppm { padding:3px 10px; border-radius:var(--rs); border:0.5px solid #ddd6fe;
      background:#f5f3ff; color:#6d28d9; font-size:11px; font-weight:600; cursor:pointer; }
    .arch-ppm:hover { background:#ddd6fe; }
  &lt;/style&gt;
&lt;/head&gt;

  function toggleHistType(id, type) {
    const el = document.getElementById(&#x27;hist-&#x27;+id);
    if (!el) return;
    // If already open showing same type, close it
    if (el.style.display !== &#x27;none&#x27; &amp;&amp; el.dataset.activeType === type) {
      el.style.display = &#x27;none&#x27;;
      el.dataset.activeType = &#x27;&#x27;;
      return;
    }
    // Filter rows to show only the selected type
    el.querySelectorAll(&#x27;.hist-row&#x27;).forEach(row =&gt; {
      const badge = row.querySelector(&#x27;.type-badge&#x27;);
      if (!badge) { row.style.display = &#x27;&#x27;; return; }
      row.style.display = badge.classList.contains(&#x27;type-&#x27;+type) ? &#x27;&#x27; : &#x27;none&#x27;;
    });
    el.style.display = &#x27;&#x27;;
    el.dataset.activeType = type;
  }

  /* ── Employee list filtering ── */
  function filterEmployees() {
    const q      = document.getElementById(&#x27;emp-search&#x27;).value.trim().toLowerCase();
    const status = document.getElementById(&#x27;filter-status&#x27;).value;
    const mgr    = document.getElementById(&#x27;filter-mgr&#x27;).value;
    const rows   = document.querySelectorAll(&#x27;#emp-list .erow&#x27;);
    let visible  = 0;

    rows.forEach(r =&gt; {
      const name    = (r.dataset.name  || &#x27;&#x27;).toLowerCase();
      const rowMgr  = (r.dataset.mgr   || &#x27;&#x27;);
      const rowCva  = (r.dataset.cva   || &#x27;&#x27;);

      const matchQ   = !q      || name.includes(q);
      const matchSt  = !status || rowCva.includes(status);
      const matchMgr = !mgr    || rowMgr === mgr;

      const show = matchQ &amp;&amp; matchSt &amp;&amp; matchMgr;
      r.style.display = show ? &#x27;&#x27; : &#x27;none&#x27;;
      if (show) visible++;
    });

    const total = rows.length;
    document.getElementById(&#x27;emp-count&#x27;).textContent =
      visible === total
        ? `Showing all ${total} employees`
        : `Showing ${visible} of ${total} employees`;

    document.getElementById(&#x27;emp-no-results&#x27;).style.display = visible ? &#x27;none&#x27; : &#x27;&#x27;;
    document.getElementById(&#x27;view-all-link&#x27;).style.display  = visible ? &#x27;&#x27; : &#x27;none&#x27;;
  }

  function clearFilters() {

    document.getElementById(&#x27;filter-status&#x27;).value = &#x27;&#x27;;
    document.getElementById(&#x27;filter-mgr&#x27;).value    = &#x27;&#x27;;
    filterEmployees();
  }
